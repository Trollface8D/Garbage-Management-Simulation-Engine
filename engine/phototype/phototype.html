<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Editor Prototype</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        function SplitEditor() {
            const [blocks, setBlocks] = useState([
                {
                    id: Date.now(),
                    text: "Welcome to this proof-of-concept editor. You can split text by click position, select multiple blocks to join, and test automatic document chunking. Try editing this paragraph, add your own wording, then run Autochunk to see how the document is rebuilt into evenly sized chunks for the entire content."
                }
            ]);
            const [activeIndex, setActiveIndex] = useState(0);
            const [isCutMode, setIsCutMode] = useState(false);
            const [selectedForJoin, setSelectedForJoin] = useState([]);
            const textRefs = useRef([]);

            const createBlock = (text) => ({
                id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
                text
            });

            const handleEdit = (index, newText) => {
                const updatedBlocks = [...blocks];
                updatedBlocks[index].text = newText;
                setBlocks(updatedBlocks);
            };

            const handleCutAt = (index, cursorPosition) => {
                const currentText = blocks[index].text;

                const part1 = currentText.substring(0, cursorPosition);
                const part2 = currentText.substring(cursorPosition);

                const updatedBlocks = [...blocks];
                updatedBlocks.splice(index, 1,
                    createBlock(part1),
                    createBlock(part2)
                );

                setBlocks(updatedBlocks);
                setActiveIndex(index + 1);
                setIsCutMode(false);
            };

            const armCutMode = () => {
                setIsCutMode(true);
            };

            const handleTextareaMouseUp = (index, event) => {
                if (!isCutMode) return;
                const cursorPosition = event.target.selectionStart ?? 0;
                handleCutAt(index, cursorPosition);
            };

            const toggleJoinSelection = (index) => {
                setSelectedForJoin((prev) => {
                    if (prev.includes(index)) {
                        return prev.filter((i) => i !== index);
                    }
                    return [...prev, index].sort((a, b) => a - b);
                });
            };

            const handleJoinSelected = () => {
                if (selectedForJoin.length < 2) return;

                const sortedIndexes = [...selectedForJoin].sort((a, b) => a - b);
                const insertionIndex = sortedIndexes[0];
                const selectedIndexSet = new Set(sortedIndexes);
                const mergedText = sortedIndexes
                    .map((i) => blocks[i].text.trim())
                    .filter(Boolean)
                    .join(" ");

                const updatedBlocks = blocks.filter((_, i) => !selectedIndexSet.has(i));
                updatedBlocks.splice(insertionIndex, 0, createBlock(mergedText));

                setBlocks(updatedBlocks);
                setActiveIndex(insertionIndex);
                setSelectedForJoin([]);
            };

            const handleAutochunk = () => {
                const shouldProceed = window.confirm(
                    "Autochunk will rechunk the entire document into 20-word blocks and reset current block-level edits. Continue?"
                );

                if (!shouldProceed) return;

                const fullText = blocks
                    .map((block) => block.text.trim())
                    .filter(Boolean)
                    .join(" ");

                const words = fullText.split(/\s+/).filter(Boolean);
                if (words.length === 0) return;

                // Prototype behavior: fixed 20-word chunks. Replace this with LLM semantic chunking in production.
                const chunkSize = 20;
                const rechunkedBlocks = [];
                for (let i = 0; i < words.length; i += chunkSize) {
                    rechunkedBlocks.push(createBlock(words.slice(i, i + chunkSize).join(" ")));
                }

                setBlocks(rechunkedBlocks);
                setActiveIndex(0);
                setSelectedForJoin([]);
                setIsCutMode(false);
            };

            return (
                <div className="max-w-3xl mx-auto p-8">
                    <h2 className="text-3xl font-bold mb-6 text-gray-800">Interactive Editor Prototype</h2>

                    {/* TOOLBOX UI */}
                    <div className="flex gap-3 mb-6 p-4 bg-white rounded-lg shadow-sm border border-gray-200">
                        <button
                            onClick={armCutMode}
                            className={`px-4 py-2 rounded font-medium transition ${isCutMode ? 'bg-blue-600 text-white' : 'bg-blue-100 text-blue-700 hover:bg-blue-200'}`}
                        >
                            {isCutMode ? 'Click text to split...' : '✂️ Cut (Split by Click)'}
                        </button>
                        <button
                            onClick={handleJoinSelected}
                            disabled={selectedForJoin.length < 2}
                            className="px-4 py-2 bg-green-100 text-green-700 rounded hover:bg-green-200 font-medium disabled:opacity-50 transition"
                        >
                            🔗 Join Selected ({selectedForJoin.length})
                        </button>
                        <button
                            onClick={handleAutochunk}
                            className="px-4 py-2 bg-purple-100 text-purple-700 rounded hover:bg-purple-200 font-medium transition"
                        >
                            🧩 Autochunk
                        </button>
                    </div>

                    {isCutMode && (
                        <p className="mb-4 text-sm text-blue-700 bg-blue-50 border border-blue-200 rounded p-3">
                            Cut mode is active: click inside any block to split at that clicked position.
                        </p>
                    )}

                    {/* EDITOR AREA */}
                    <div className="space-y-4">
                        {blocks.map((block, index) => (
                            <div
                                key={block.id}
                                className={`relative p-3 rounded-lg border-2 transition-colors duration-200 ${activeIndex === index ? 'border-blue-400 bg-white shadow-sm' : 'border-transparent bg-gray-200'} ${selectedForJoin.includes(index) ? 'ring-2 ring-green-300' : ''}`}
                            >
                                <label className="absolute top-3 left-3 flex items-center gap-2 text-xs font-semibold text-green-700 uppercase tracking-wider bg-green-50 px-2 py-1 rounded">
                                    <input
                                        type="checkbox"
                                        checked={selectedForJoin.includes(index)}
                                        onChange={() => toggleJoinSelection(index)}
                                        onClick={(e) => e.stopPropagation()}
                                    />
                                    Join
                                </label>
                                <textarea
                                    ref={el => textRefs.current[index] = el}
                                    value={block.text}
                                    onChange={(e) => handleEdit(index, e.target.value)}
                                    onFocus={() => setActiveIndex(index)}
                                    onMouseUp={(e) => handleTextareaMouseUp(index, e)}
                                    className="w-full min-h-[100px] p-2 pt-12 bg-transparent outline-none resize-y text-gray-800"
                                    placeholder="Type something..."
                                />
                                <span className="absolute top-3 right-5 text-xs font-bold text-gray-400 uppercase tracking-wider">
                                    Block {index + 1}
                                </span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SplitEditor />);
    </script>
</body>

</html>
